backend:
  name: github
  repo: Bhatta-om/cecsd-nepal
  branch: main
  base_url: https://cms-oauth.omprakashbhatt731.workers.dev
  auth_endpoint: /api/auth

media_folder: public/images
public_folder: /images

collections:
  - name: "site"
    label: "🌐 Website Content"
    files:
      - name: "site_content"
        label: "All Content"
        file: "public/content/site.json"
        fields:
          - label: "🏠 Hero Section"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Tag Line", name: "tag", widget: "string" }
              - { label: "Heading Line 1", name: "heading_line1", widget: "string" }
              - { label: "Heading Line 2", name: "heading_line2", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Primary Button", name: "btn_primary", widget: "string" }
              - { label: "Secondary Button", name: "btn_secondary", widget: "string" }

          - label: "ℹ️ About Section"
            name: "about"
            widget: "object"
            fields:
              - { label: "Tag", name: "tag", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Years of Service", name: "years_of_service", widget: "string" }

          - label: "📊 Statistics"
            name: "stats"
            widget: "list"
            fields:
              - { label: "Value", name: "value", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }

          - label: "🎯 Vision Mission Goal"
            name: "vmg"
            widget: "list"
            fields:
              - { label: "Icon (emoji)", name: "icon", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }

          - label: "📚 Programs"
            name: "programs"
            widget: "list"
            fields:
              - { label: "Icon (emoji)", name: "icon", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }
              - label: "Border Color"
                name: "color"
                widget: "select"
                options:
                  - "border-emerald-700"
                  - "border-blue-800"
                  - "border-red-800"
                  - "border-indigo-700"
                  - "border-purple-700"
                  - "border-teal-700"

          - label: "🎯 Strategies"
            name: "strategies"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }

          - label: "👥 Executive Committee"
            name: "team"
            widget: "list"
            fields:
              - { label: "Full Name", name: "name", widget: "string" }
              - { label: "Role", name: "role", widget: "string" }
              - { label: "Education", name: "edu", widget: "string" }
              - { label: "Experience", name: "exp", widget: "string" }
              - label: "Gender"
                name: "gender"
                widget: "select"
                options:
                  - { label: "Male", value: "M" }
                  - { label: "Female", value: "F" }

          - label: "🧑‍💼 Core Staff"
            name: "core_staff"
            widget: "list"
            fields:
              - { label: "Full Name", name: "name", widget: "string" }
              - { label: "Role", name: "role", widget: "string" }
              - { label: "Phone", name: "phone", widget: "string", required: false }

          - label: "🖼️ Gallery"
            name: "gallery"
            widget: "list"
            fields:
              - { label: "Image", name: "src", widget: "image" }
              - { label: "Label/Caption", name: "label", widget: "string" }
              - label: "Category"
                name: "category"
                widget: "select"
                options:
                  - "Events"
                  - "Training"
                  - "Meetings"
                  - "Field"
                  - "Education"

          - label: "🔄 Ongoing Programs"
            name: "ongoing_programs"
            widget: "list"
            fields:
              - { label: "Project Title", name: "title", widget: "string" }
              - { label: "Funded By", name: "funded_by", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }
              - { label: "Status", name: "status", widget: "string", default: "Ongoing" }
              - { label: "PDF Document (optional)", name: "pdf", widget: "file", required: false, media_folder: "public/documents", public_folder: "/documents" }
