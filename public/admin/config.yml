backend:
  name: git-gateway
  branch: main

media_folder: public/images
public_folder: /images

collections:
  - name: "settings"
    label: "Site Settings"
    files:
      - name: "general"
        label: "General Settings"
        file: "src/data.js"
        fields:
          - label: "Site Title"
            name: "siteTitle"
            widget: "string"

  - name: "gallery"
    label: "Gallery"
    folder: "public/images/gallery"
    create: true
    slug: "{{slug}}"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Image"
        name: "image"
        widget: "image"
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "Community Meetings"
          - "Training"
          - "Field Activities"
          - "Events"